steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://karan:password123@localhost:5432/chat_app_test

      - name: Run linter
        run: npm run lint:ci

      - name: Run tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://karan:password123@localhost:5432/chat_app_test
          JWT_ACCESS_SECRET: test-access-secret-for-ci-must-be-32-chars
          JWT_REFRESH_SECRET: test-refresh-secret-for-ci-must-be-32-chars

      - name: Build
        run: npm run build